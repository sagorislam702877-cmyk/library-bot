services:
  - type: web
    name: shibir-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python shibir_bot.py
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: SHEET_NAME
        value: MyBotDB
      - key: LOG_SHEET_NAME
        value: Logs
